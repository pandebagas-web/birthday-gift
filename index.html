<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <style>
        /* Gaya Pixel/Gamebot */
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Poppins:wght@400;600&display=swap');

        body, html {
            margin: 0; padding: 0; overflow: hidden;
            font-family: 'Poppins', sans-serif;
            background-color: #a2d2ff; /* Biru muda */
        }

        /* Halaman 1: Gamebot Style */
        #page1 {
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; height: 100vh; text-align: center;
            background: radial-gradient(circle, #a2d2ff 0%, #7ebcfc 100%);
            z-index: 10; position: relative;
        }

        .gamebot-text {
            font-family: 'Press Start 2P', cursive;
            color: #2b2d42; font-size: 14px; line-height: 2;
            margin-bottom: 30px; text-shadow: 2px 2px #fff;
        }

        .btn-unlock {
            background-color: #bdc3c7;
            border: 3px solid #000;
            border-radius: 15px;
            padding: 15px 30px;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px; cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-unlock:hover { transform: scale(1.05); }

        /* Halaman 2: Greeting Card */
        #page2 {
            display: none; height: 100vh; width: 100%;
            background: linear-gradient(135deg, #f8f9fa 0%, #e3f2fd 100%);
            flex-direction: column; align-items: center; justify-content: center;
        }

        .card {
            background: white; padding: 30px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-left: 10px solid #74c0fc;
            max-width: 80%; text-align: center; z-index: 5;
            color: #495057; border-top: 5px solid #ced4da;
        }

        .card h1 { color: #1971c2; margin-bottom: 10px; }
        .card p { font-size: 16px; line-height: 1.6; }
        .regards { margin-top: 20px; font-weight: bold; color: #1971c2; }

        .btn-gift {
            margin-top: 30px; background: #74c0fc; color: white;
            border: none; padding: 12px 40px; border-radius: 50px;
            font-weight: bold; cursor: pointer; z-index: 6;
        }

        /* Animasi Bunga & Balon */
        .flower { position: absolute; bottom: -50px; transition: transform 5s linear; z-index: 4; }
        .balloon { position: absolute; bottom: -100px; font-size: 30px; z-index: 3; }

        canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 7; }
    </style>
</head>
<body>

    <!-- Audio (Ganti link SRC dengan link file mp3 Brian Rahmattio jika ada link langsungnya) -->
    <audio id="hbdMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <!-- Halaman 1 -->
    <div id="page1">
        <div class="gamebot-text">
            Happy Birthday Sayangku!<br>
            Semoga apa yang selalu kamu<br>
            semogakan terwujud ya!
        </div>
        <button class="btn-unlock" onclick="startApp()">Press to unlock the Gift</button>
    </div>

    <!-- Halaman 2 -->
    <div id="page2">
        <div class="card">
            <h1>Happy Birthday Sayangku!</h1>
            <p>Selamat sudah mencapai Chapter 26 dalam hidupmu ya!</p>
            <p>Semoga apa pun yang kamu terima kedepannya, selalu menjadi yang terbaik di dalam hidupmu.</p>
            <div class="regards">Best regards, Bagas</div>
        </div>
        <button class="btn-gift" id="giftBtn" onclick="triggerGift()">Gift</button>
        <canvas id="fireworks"></canvas>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        const music = document.getElementById('hbdMusic');
        let giftClickCount = 0;

        function startApp() {
            music.play();
            document.getElementById('page1').style.display = 'none';
            document.getElementById('page2').style.display = 'flex';
        }

        function triggerGift() {
            giftClickCount++;
            
            if (giftClickCount === 1) {
                // Sesi 1: Bunga, Balon, Confetti
                spawnFlowers();
                spawnBalloons();
                launchConfetti();
            } else if (giftClickCount % 2 === 0) {
                // Sesi 2: Kembang Api Tulisan
                showTextFirework();
            } else {
                // Sesi 3: Kembang Api Biasa
                showNormalFirework();
            }
        }

        function spawnFlowers() {
            const flowers = ['🌸', '🌹', '🌷', '🌻', '🌼', '🌺', '💮'];
            for(let i=0; i<30; i++) {
                setTimeout(() => {
                    const el = document.createElement('div');
                    el.className = 'flower';
                    el.innerHTML = flowers[Math.floor(Math.random()*flowers.length)];
                    el.style.left = Math.random() * 100 + "vw";
                    el.style.fontSize = (Math.random() * 20 + 20) + "px";
                    document.body.appendChild(el);
                    
                    // Animasi tumbuh ke atas 1/3 halaman
                    el.animate([
                        { transform: 'translateY(0)', opacity: 0 },
                        { transform: `translateY(-${Math.random() * 30 + 10}vh)`, opacity: 1 }
                    ], { duration: 3000, fill: 'forwards' });
                }, i * 200);
            }
        }

        function spawnBalloons() {
            for(let i=0; i<15; i++) {
                setTimeout(() => {
                    const b = document.createElement('div');
                    b.className = 'balloon';
                    b.innerHTML = '🎈';
                    b.style.left = Math.random() * 100 + "vw";
                    document.body.appendChild(b);
                    
                    b.animate([
                        { transform: 'translateY(0)', opacity: 1 },
                        { transform: 'translateY(-120vh)', opacity: 0 }
                    ], { duration: 7000, easing: 'linear' });
                }, i * 500);
            }
        }

        function launchConfetti() {
            const end = Date.now() + 3000;
            (function frame() {
                confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 } });
                confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 } });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        // Logika Kembang Api (Sederhana untuk demo, menggunakan Confetti sebagai pengganti ledakan cahaya)
        function showTextFirework() {
            // Simulasi ledakan teks dengan confetti besar di tengah
            const scalar = 2;
            const triangle = confetti.shapeFromText({ text: 'HBD', scalar });

            confetti({
                shapes: [triangle],
                particleCount: 50,
                spread: 100,
                origin: { y: 0.3 },
                colors: ['#ff0000', '#ffa500', '#ffff00']
            });
            
            alert("✨ HAPPY BIRTHDAY ✨"); // Fallback teks visual
        }

        function showNormalFirework() {
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#00f', '#0ff', '#fff']
            });
        }
    </script>
</body>
</html>
